<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS Experiment 2: Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-secondary bg-opacity-10 py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h2 class="mb-0">Student Registration Form</h2>
                    </div>
                    <div class="card-body p-4">
                        
                        <!-- Alert Message (Initially Hidden) -->
                        <div id="successAlert" class="alert alert-success alert-dismissible fade show d-none" role="alert">
                            <strong>Success!</strong> Your registration has been submitted successfully.
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <form id="regForm" class="row g-3 needs-validation" novalidate>
                            <!-- Student Name -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Student Name</label>
                                <input type="text" class="form-control" placeholder="Enter Full Name" required>
                                <div class="invalid-feedback">Please enter student name.</div>
                            </div>

                            <!-- Roll Number -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Roll Number</label>
                                <input type="text" class="form-control" placeholder="e.g. 22ITC01" required>
                            </div>

                            <!-- Email -->
                            <div class="col-md-12">
                                <label class="form-label fw-bold">Email Address</label>
                                <input type="email" class="form-control" placeholder="name@college.edu" required>
                            </div>

                            <!-- Gender (Radio) -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold d-block">Gender</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="male" value="male" required>
                                    <label class="form-check-label" for="male">Male</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                                    <label class="form-check-label" for="female">Female</label>
                                </div>
                            </div>

                            <!-- Department (Dropdown) -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Department</label>
                                <select class="form-select" required>
                                    <option selected disabled value="">Choose Dept...</option>
                                    <option>Computer Science</option>
                                    <option>Information Technology</option>
                                    <option>Electronics</option>
                                </select>
                            </div>

                            <!-- Subjects (Checkboxes) -->
                            <div class="col-12">
                                <label class="form-label fw-bold d-block">Subjects Enrolled</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" value="java" id="sub1">
                                    <label class="form-check-label" for="sub1">Java</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" value="ead" id="sub2">
                                    <label class="form-check-label" for="sub2">Bootstrap/EAD</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" value="os" id="sub3">
                                    <label class="form-check-label" for="sub3">Operating Systems</label>
                                </div>
                            </div>

                            <!-- File Upload -->
                            <div class="col-12">
                                <label class="form-label fw-bold">Upload Photo</label>
                                <input type="file" class="form-control" accept="image/*" required>
                            </div>

                            <!-- Buttons -->
                            <div class="col-12 text-center mt-4">
                                <button class="btn btn-primary px-5 py-2 me-2" type="submit">Submit Registration</button>
                                <button class="btn btn-outline-danger px-5 py-2" type="reset">Reset Form</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Form Validation Script
        const form = document.getElementById('regForm');
        form.addEventListener('submit', function(event) {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            } else {
                event.preventDefault();
                document.getElementById('successAlert').classList.remove('d-none');
                window.scrollTo(0, 0);
            }
            form.classList.add('was-validated');
        }, false);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
