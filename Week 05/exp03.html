<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Login Portal</title>
    <style>
        .auth-panel {
            border: 2px solid #444;
            width: 320px;
            padding: 20px;
            margin: 50px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50; /* Changed from bisque */
            color: white;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .input-group {
            margin: 10px 0;
            color: #ecf0f1;
        }
        .input-group input {
            border-radius: 4px;
            border: 1px solid #7f8c8d;
            padding: 5px;
        }
        #entry-button {
            margin-top: 15px;
            padding: 8px 16px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
        }
        #entry-button:hover {
            background-color: #2980b9;
        }
        #alert-box {
            color: #e74c3c;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <form>
        <div class="auth-panel">
            <h3>Staff Login</h3>
            <div class="input-group">
                <label>User ID:</label>
                <input type="text" id="accountID" required>
            </div>
            <div class="input-group">
                <label>Passcode:</label>
                <input type="password" id="secretCode" required>
            </div>
            <p id="alert-box"></p>
            <button id="entry-button" type="button" onclick="verifyCredentials()">Login</button>
        </div>
    </form>

    <script>
        let attemptsMade = 0;
        function verifyCredentials() {
            const user = document.getElementById("accountID").value;
            const pass = document.getElementById("secretCode").value;
            const feedback = document.getElementById("alert-box");
            const btn = document.getElementById("entry-button");

            if (!user || !pass) {
                feedback.innerText = "Please fill all fields.";
                return;
            } 
            
            if (pass.length < 6) {
                feedback.innerText = "Code is too short.";
                return;
            }

            if (user === "admin" && pass === "123456") {
                feedback.style.color = "#2ecc71";
                feedback.innerText = "Entry Permitted.";
            } else {
                attemptsMade++;
                feedback.innerText = `Denied. Attempt #${attemptsMade}`;
                if (attemptsMade >= 3) {
                    feedback.innerText = "Maximum attempts reached.";
                    btn.disabled = true;
                    btn.style.opacity = "0.5";
                }
            }
        }
    </script>
</body>
</html>
